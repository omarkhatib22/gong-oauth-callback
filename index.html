<!DOCTYPE html>
<html>
<head>
<title>Gong OAuth</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 40px; max-width: 500px; }
  #code-box { font-family: monospace; font-size: 14px; background: #f4f4f4; padding: 12px 16px;
              border-radius: 6px; word-break: break-all; margin: 16px 0; }
  button { background: #6366f1; color: white; border: none; padding: 10px 20px;
           border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:active { background: #4f46e5; }
  #copied { color: #16a34a; font-size: 13px; margin-left: 8px; display: none; }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    document.write('<h2>Authorization failed</h2><p>' + error + '</p>');
  } else if (!code) {
    document.write('<h2>No authorization code found.</h2>');
  } else {
    // Try localhost callback in the background (works when running via Claude Code)
    fetch('http://127.0.0.1:9876/callback?code=' + encodeURIComponent(code))
      .catch(() => {}); // silent — localhost may not be running in all environments

    document.write(`
      <h2>Almost done</h2>
      <p>Copy the code below and paste it into Claude:</p>
      <div id="code-box">${code}</div>
      <button onclick="navigator.clipboard.writeText('${code}').then(()=>{ document.getElementById('copied').style.display='inline'; })">
        Copy code
      </button>
      <span id="copied">Copied!</span>
      <p style="margin-top:24px;color:#6b7280;font-size:13px;">Then tell Claude: <em>"Complete Gong auth with code: [paste code]"</em></p>
    `);
  }
</script>
</body>
</html>
