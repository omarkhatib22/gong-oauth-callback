<!DOCTYPE html>
<html>
<head><title>Gong OAuth</title></head>
<body>
<p>Authorizing...</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  if (error) {
    document.body.innerHTML = '<p>Authorization failed: ' + error + '</p>';
  } else if (code) {
    window.location.href = 'http://127.0.0.1:9876/callback?code=' + encodeURIComponent(code);
  }
</script>
</body>
</html>
